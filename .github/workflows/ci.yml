name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/sooqna-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/sooqna-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  web:
    name: Web Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder-auth-domain
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder-project-id
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ci-placeholder-sender-id
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder-app-id
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ci-placeholder-measurement-id
        run: npm run build
