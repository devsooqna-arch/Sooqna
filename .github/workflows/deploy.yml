name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy_production:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          BACKEND_FIREBASE_PROJECT_ID: ${{ secrets.BACKEND_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_BACKEND_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_API_BASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        run: |
          set -e
          required_vars=(
            DEPLOY_HOST
            DEPLOY_USER
            DEPLOY_PORT
            DEPLOY_APP_DIR
            DEPLOY_SSH_KEY
            BACKEND_DATABASE_URL
            NEXT_PUBLIC_BACKEND_API_BASE_URL
            NEXT_PUBLIC_SITE_URL
            NEXT_PUBLIC_FIREBASE_API_KEY
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
            NEXT_PUBLIC_FIREBASE_PROJECT_ID
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
            NEXT_PUBLIC_FIREBASE_APP_ID
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
          )

          # BACKEND_FIREBASE_PROJECT_ID is optional — falls back to NEXT_PUBLIC_FIREBASE_PROJECT_ID
          if [ -z "$BACKEND_FIREBASE_PROJECT_ID" ]; then
            export BACKEND_FIREBASE_PROJECT_ID="$NEXT_PUBLIC_FIREBASE_PROJECT_ID"
          fi

          missing=0
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Missing required secret: ${var_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if [[ "$DEPLOY_SSH_KEY" != *"BEGIN "* ]] || [[ "$DEPLOY_SSH_KEY" != *"PRIVATE KEY"* ]]; then
            echo "::error::DEPLOY_SSH_KEY does not look like a private key. Paste full private key including BEGIN/END lines."
            exit 1
          fi

      - name: Deploy backend and web to production server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          BACKEND_FIREBASE_PROJECT_ID: ${{ secrets.BACKEND_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_BACKEND_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_API_BASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          # Let the shell script control failures (set -e / explicit exits).
          # `script_stop: true` can prematurely stop on valid test commands that return 1.
          script_stop: false
          envs: DEPLOY_APP_DIR,BACKEND_DATABASE_URL,BACKEND_FIREBASE_PROJECT_ID,NEXT_PUBLIC_BACKEND_API_BASE_URL,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
          script: |
            set -Eeo pipefail

            echo "===== START DEPLOY ====="

            cd "$DEPLOY_APP_DIR"
            git config --global --add safe.directory "$DEPLOY_APP_DIR"

            if ! git remote get-url origin >/dev/null 2>&1; then
              echo "Missing git remote 'origin' in $DEPLOY_APP_DIR"
              echo "Set it once on server: git remote add origin git@github.com:devsooqna-arch/Sooqna.git"
              exit 1
            fi

            git clean -fd \
              -e backend/sooqna-backend/uploads/ \
              -e apps/web/.env.local

            rm -f backend/sooqna-backend/uploads/listings/.gitkeep
            rm -f backend/sooqna-backend/uploads/profiles/.gitkeep

            git fetch origin
            git checkout -B main origin/main
            git reset --hard origin/main

            # =========================
            # Backend deployment
            # =========================
            cd backend/sooqna-backend

            echo "===== BACKEND INFO ====="
            echo "PWD:"
            pwd
            echo "Node version:"
            node -v
            echo "NPM version:"
            npm -v

            echo "Installing backend dependencies..."
            npm ci --production=false --include=dev

            echo "Generating Prisma client..."
            npm run prisma:generate

            echo "===== TYPESCRIPT DEBUG ====="
            echo "tsc symlink:"
            ls -lah ./node_modules/.bin/tsc || true

            echo "typescript package:"
            ls -lah ./node_modules/typescript/bin || true

            echo "tsconfig exists?"
            ls -lah tsconfig.json || true

            echo "TypeScript version via npx:"
            npx tsc -v || true

            echo "TypeScript version via node:"
            node ./node_modules/typescript/bin/tsc -v || true

            echo "===== RUN BACKEND BUILD ====="
            build_exit=0

            set +e
            node ./node_modules/typescript/bin/tsc -p tsconfig.json --pretty false > /tmp/backend-tsc.log 2>&1
            build_exit=$?
            set -e

            echo "build_exit=$build_exit"
            echo "========== backend-tsc.log =========="
            cat /tmp/backend-tsc.log || true
            echo "====================================="

            if [ "$build_exit" -ne 0 ]; then
              echo "Backend TypeScript build failed with exit code: $build_exit"
              exit "$build_exit"
            fi

            echo "Backend TypeScript build succeeded."

            echo "===== DATABASE DEBUG ====="
            echo "Checking whether BACKEND_DATABASE_URL exists..."
            DB_URL_RAW="${BACKEND_DATABASE_URL-}"
            echo "BACKEND_DATABASE_URL raw length: ${#DB_URL_RAW}"
            # Normalize common secret mistakes:
            # - storing as `DATABASE_URL=...` instead of value only
            # - wrapping in single/double quotes
            # - accidental CR/LF characters
            DB_URL="${DB_URL_RAW#DATABASE_URL=}"
            DB_URL="${DB_URL%\"}"
            DB_URL="${DB_URL#\"}"
            DB_URL="${DB_URL%\'}"
            DB_URL="${DB_URL#\'}"
            DB_URL="${DB_URL//$'\r'/}"
            DB_URL="${DB_URL//$'\n'/}"
            echo "BACKEND_DATABASE_URL normalized length: ${#DB_URL}"
            if [ -z "$DB_URL" ]; then
              echo "BACKEND_DATABASE_URL is required and cannot be empty."
              exit 1
            fi

            DB_SCHEME="${DB_URL%%://*}"
            echo "Detected DB URL scheme: ${DB_SCHEME:-<none>}"
            if [[ "$DB_URL" != postgresql://* && "$DB_URL" != postgres://* ]]; then
              echo "BACKEND_DATABASE_URL is invalid. Expected to start with postgresql:// or postgres://"
              echo "Save the GitHub secret as URL value only (no DATABASE_URL= prefix, no quotes)."
              exit 1
            fi
            echo "BACKEND_DATABASE_URL is present and normalized."
            export DATABASE_URL="$DB_URL"
            echo "DATABASE_URL exported successfully."

            # ─────────────────────────────────────────────────────────────
            # Write production backend .env
            # This overwrites the file on every deploy so values always
            # reflect the current GitHub secrets — no manual edits needed.
            # ─────────────────────────────────────────────────────────────
            # Use NEXT_PUBLIC_FIREBASE_PROJECT_ID as fallback if BACKEND_FIREBASE_PROJECT_ID not set
            BACKEND_FIREBASE_PROJECT_ID="${BACKEND_FIREBASE_PROJECT_ID:-${NEXT_PUBLIC_FIREBASE_PROJECT_ID}}"

            echo "Writing production backend .env..."
            {
              echo "NODE_ENV=production"
              echo "PORT=5000"
              echo "CORS_ORIGIN=${NEXT_PUBLIC_SITE_URL}"
              echo "FIREBASE_PROJECT_ID=${BACKEND_FIREBASE_PROJECT_ID}"
              echo "ENABLE_CATEGORIES_JSON_FALLBACK=false"
              echo "DATABASE_URL=${DATABASE_URL}"
            } > .env
            echo "Backend .env written (NODE_ENV=production, CORS_ORIGIN=${NEXT_PUBLIC_SITE_URL}, FIREBASE_PROJECT_ID set, DATABASE_URL=SET)."

            echo "Listing prisma directory..."
            ls -lah prisma || true
            echo "Listing prisma migrations directory..."
            ls -lah prisma/migrations || true

            echo "Running prisma migrate deploy..."
            migrate_exit=0
            set +e
            npx prisma migrate deploy > /tmp/prisma-migrate.log 2>&1
            migrate_exit=$?
            set -Eeo pipefail

            echo "prisma_migrate_exit=$migrate_exit"
            echo "========== prisma-migrate.log =========="
            cat /tmp/prisma-migrate.log || true
            echo "========================================"

            if [ "$migrate_exit" -ne 0 ]; then
              echo "Prisma migrate deploy failed with exit code: $migrate_exit"
              exit "$migrate_exit"
            fi

            echo "Prisma migrate deploy finished successfully."
            echo "Running backend DB preflight check after migrations..."
            npm run db:check

            echo "Seeding categories from JSON (idempotent upsert — required for deploy parity)..."
            seed_exit=0
            set +e
            npm run db:migrate-json > /tmp/db-seed.log 2>&1
            seed_exit=$?
            set -Eeo pipefail

            echo "seed_exit=$seed_exit"
            echo "========== db-seed.log =========="
            cat /tmp/db-seed.log || true
            echo "================================="

            if [ "$seed_exit" -ne 0 ]; then
              echo "Category seed failed (exit $seed_exit). Failing deploy to avoid partial rollout."
              exit "$seed_exit"
            fi

            echo "Checking dist output..."
            ls -lah dist || true

            echo "Restarting backend with PM2 (--update-env picks up new .env values)..."
            pm2 restart sooqna-backend --update-env || pm2 start dist/server.js --name sooqna-backend

            cd ../..

            # =========================
            # Web deployment
            # =========================
            cd apps/web

            echo "===== WEB INFO ====="
            pwd
            node -v
            npm -v

            echo "Writing .env.local ..."
            {
              echo "NEXT_PUBLIC_BACKEND_API_BASE_URL=${NEXT_PUBLIC_BACKEND_API_BASE_URL}"
              echo "NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}"
              echo "NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}"
              echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}"
              echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}"
              echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}"
              echo "NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}"
              echo "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}"
              echo "NEXT_PUBLIC_SITEMAP_LISTINGS_LIMIT=200"
              echo "NEXT_PUBLIC_SITEMAP_FETCH_TIMEOUT_MS=7000"
              echo "NEXT_PUBLIC_AUTH_DEBUG=false"
            } > .env.local

            echo "Installing web dependencies..."
            npm ci

            echo "Building web app..."
            npm run build

            echo "Restarting web with PM2..."
            pm2 restart sooqna-web || pm2 start "npm run start -- -p 3000" --name sooqna-web

            cd ../..

            echo "===== DEPLOY FINISHED ====="

      - name: Health check backend
        run: |
          echo "Waiting 15s for PM2 processes to stabilize..."
          sleep 15
          echo "Checking backend health..."
          curl --fail --show-error --silent "https://un.flashpointjordan.com/api/health"
          echo ""
          echo "Health check passed."
