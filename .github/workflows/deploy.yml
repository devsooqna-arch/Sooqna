name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy_production:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          NEXT_PUBLIC_BACKEND_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_API_BASE_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        run: |
          set -e
          required_vars=(
            DEPLOY_HOST
            DEPLOY_USER
            DEPLOY_PORT
            DEPLOY_APP_DIR
            DEPLOY_SSH_KEY
            NEXT_PUBLIC_BACKEND_API_BASE_URL
            NEXT_PUBLIC_FIREBASE_API_KEY
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
            NEXT_PUBLIC_FIREBASE_PROJECT_ID
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
            NEXT_PUBLIC_FIREBASE_APP_ID
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
          )

          missing=0
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Missing required secret: ${var_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if [[ "$DEPLOY_SSH_KEY" != *"BEGIN "* ]] || [[ "$DEPLOY_SSH_KEY" != *"PRIVATE KEY"* ]]; then
            echo "::error::DEPLOY_SSH_KEY does not look like a private key. Paste full private key including BEGIN/END lines."
            exit 1
          fi

      - name: Deploy backend and web to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -e

            # Full monorepo path on production server.
            cd "${{ secrets.DEPLOY_APP_DIR }}"
            git config --global --add safe.directory "${{ secrets.DEPLOY_APP_DIR }}"
            if ! git remote get-url origin >/dev/null 2>&1; then
              echo "Missing git remote 'origin' in ${{ secrets.DEPLOY_APP_DIR }}."
              echo "Set it once on server: git remote add origin git@github.com:devsooqna-arch/Sooqna.git"
              exit 1
            fi

            # Clean conflicting untracked files from one-time extracted archives.
            # Keep backend env and uploads directory across deploys.
            git clean -fd \
              -e backend/sooqna-backend/.env \
              -e backend/sooqna-backend/uploads/ \
              -e apps/web/.env.local
            rm -f backend/sooqna-backend/uploads/listings/.gitkeep
            rm -f backend/sooqna-backend/uploads/profiles/.gitkeep
            git fetch origin
            git checkout -B main origin/main
            git reset --hard origin/main

            # Backend deployment
            cd backend/sooqna-backend
            node -v
            npm -v
            # Keep devDependencies even when server NODE_ENV is set to production.
            npm ci --production=false --include=dev
            npm run prisma:generate
            npm run build -- --pretty false || {
              echo "Backend build failed. Running explicit typecheck for full diagnostics..."
              npx tsc -p tsconfig.json --noEmit --pretty false
              exit 1
            }
            if [ -n "${{ secrets.BACKEND_DATABASE_URL }}" ]; then
              export DATABASE_URL="${{ secrets.BACKEND_DATABASE_URL }}"
              npx prisma migrate deploy
            else
              echo "BACKEND_DATABASE_URL is not set; skipping prisma migrations."
            fi
            pm2 restart sooqna-backend || pm2 start dist/server.js --name sooqna-backend
            cd ../..

            # Web deployment
            cd apps/web
            cat > .env.local <<EOF
            NEXT_PUBLIC_BACKEND_API_BASE_URL=${{ secrets.NEXT_PUBLIC_BACKEND_API_BASE_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
            NEXT_PUBLIC_AUTH_DEBUG=false
            EOF
            npm ci
            npm run build
            pm2 restart sooqna-web || pm2 start "npm run start -- -p 3000" --name sooqna-web
            cd ../..

      - name: Health check backend
        run: |
          curl --fail --show-error --silent "https://UN.flashpointjordan.com/api/health" > /dev/null
