name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy_production:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          NEXT_PUBLIC_BACKEND_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_API_BASE_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        run: |
          set -e
          required_vars=(
            DEPLOY_HOST
            DEPLOY_USER
            DEPLOY_PORT
            DEPLOY_APP_DIR
            DEPLOY_SSH_KEY
            NEXT_PUBLIC_BACKEND_API_BASE_URL
            NEXT_PUBLIC_FIREBASE_API_KEY
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
            NEXT_PUBLIC_FIREBASE_PROJECT_ID
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
            NEXT_PUBLIC_FIREBASE_APP_ID
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
          )

          missing=0
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Missing required secret: ${var_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if [[ "$DEPLOY_SSH_KEY" != *"BEGIN "* ]] || [[ "$DEPLOY_SSH_KEY" != *"PRIVATE KEY"* ]]; then
            echo "::error::DEPLOY_SSH_KEY does not look like a private key. Paste full private key including BEGIN/END lines."
            exit 1
          fi

      - name: Deploy backend and web to production server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          NEXT_PUBLIC_BACKEND_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_API_BASE_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          envs: DEPLOY_APP_DIR,BACKEND_DATABASE_URL,NEXT_PUBLIC_BACKEND_API_BASE_URL,NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
          script: |
            set -Eeo pipefail

            echo "===== START DEPLOY ====="

            cd "$DEPLOY_APP_DIR"
            git config --global --add safe.directory "$DEPLOY_APP_DIR"

            if ! git remote get-url origin >/dev/null 2>&1; then
              echo "Missing git remote 'origin' in $DEPLOY_APP_DIR"
              echo "Set it once on server: git remote add origin git@github.com:devsooqna-arch/Sooqna.git"
              exit 1
            fi

            git clean -fd \
              -e backend/sooqna-backend/.env \
              -e backend/sooqna-backend/uploads/ \
              -e apps/web/.env.local

            rm -f backend/sooqna-backend/uploads/listings/.gitkeep
            rm -f backend/sooqna-backend/uploads/profiles/.gitkeep

            git fetch origin
            git checkout -B main origin/main
            git reset --hard origin/main

            # =========================
            # Backend deployment
            # =========================
            cd backend/sooqna-backend

            echo "===== BACKEND INFO ====="
            echo "PWD:"
            pwd
            echo "Node version:"
            node -v
            echo "NPM version:"
            npm -v

            echo "Installing backend dependencies..."
            npm ci --production=false --include=dev

            echo "Generating Prisma client..."
            npm run prisma:generate

            echo "===== TYPESCRIPT DEBUG ====="
            echo "tsc symlink:"
            ls -lah ./node_modules/.bin/tsc || true

            echo "typescript package:"
            ls -lah ./node_modules/typescript/bin || true

            echo "tsconfig exists?"
            ls -lah tsconfig.json || true

            echo "TypeScript version via npx:"
            npx tsc -v || true

            echo "TypeScript version via node:"
            node ./node_modules/typescript/bin/tsc -v || true

            echo "===== RUN BACKEND BUILD ====="
            build_exit=0

            set +e
            node ./node_modules/typescript/bin/tsc -p tsconfig.json --pretty false > /tmp/backend-tsc.log 2>&1
            build_exit=$?
            set -e

            echo "build_exit=$build_exit"
            echo "========== backend-tsc.log =========="
            cat /tmp/backend-tsc.log || true
            echo "====================================="

            if [ "$build_exit" -ne 0 ]; then
              echo "Backend TypeScript build failed with exit code: $build_exit"
              exit "$build_exit"
            fi

            echo "Backend TypeScript build succeeded."

            echo "===== DATABASE DEBUG ====="
            echo "Checking whether BACKEND_DATABASE_URL exists..."
            DB_URL="${BACKEND_DATABASE_URL-}"
            echo "BACKEND_DATABASE_URL length: ${#DB_URL}"
            if [ -n "$DB_URL" ]; then
              echo "BACKEND_DATABASE_URL is present."
              export DATABASE_URL="$DB_URL"
              echo "DATABASE_URL exported successfully."
            else
              echo "BACKEND_DATABASE_URL is not set; skipping prisma migrations."
            fi

            echo "Listing prisma directory..."
            ls -lah prisma || true
            echo "Listing prisma migrations directory..."
            ls -lah prisma/migrations || true

            if [ -n "${DATABASE_URL:-}" ]; then
              echo "Running prisma migrate deploy..."
              migrate_exit=0
              set +e
              npx prisma migrate deploy > /tmp/prisma-migrate.log 2>&1
              migrate_exit=$?
              set -Eeo pipefail

              echo "prisma_migrate_exit=$migrate_exit"
              echo "========== prisma-migrate.log =========="
              cat /tmp/prisma-migrate.log || true
              echo "========================================"

              if [ "$migrate_exit" -ne 0 ]; then
                echo "Prisma migrate deploy failed with exit code: $migrate_exit"
                exit "$migrate_exit"
              fi

              echo "Prisma migrate deploy finished successfully."
            fi

            echo "Checking dist output..."
            ls -lah dist || true

            echo "Restarting backend with PM2..."
            pm2 restart sooqna-backend || pm2 start dist/server.js --name sooqna-backend

            cd ../..

            # =========================
            # Web deployment
            # =========================
            cd apps/web

            echo "===== WEB INFO ====="
            pwd
            node -v
            npm -v

            echo "Writing .env.local ..."
            cat > .env.local <<EOF
            NEXT_PUBLIC_BACKEND_API_BASE_URL=$NEXT_PUBLIC_BACKEND_API_BASE_URL
            NEXT_PUBLIC_FIREBASE_API_KEY=$NEXT_PUBLIC_FIREBASE_API_KEY
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=$NEXT_PUBLIC_FIREBASE_PROJECT_ID
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
            NEXT_PUBLIC_FIREBASE_APP_ID=$NEXT_PUBLIC_FIREBASE_APP_ID
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=$NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
            NEXT_PUBLIC_AUTH_DEBUG=false
            EOF

            echo "Installing web dependencies..."
            npm ci

            echo "Building web app..."
            npm run build

            echo "Restarting web with PM2..."
            pm2 restart sooqna-web || pm2 start "npm run start -- -p 3000" --name sooqna-web

            cd ../..

            echo "===== DEPLOY FINISHED ====="

      - name: Health check backend
        run: |
          curl --fail --show-error --silent "https://UN.flashpointjordan.com/api/health" > /dev/null