<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="classic">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 16px; background: var(--color-bg); font-family: var(--font-arabic); color: var(--color-text); }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.card { border-radius: 8px; border: 1px solid var(--color-border); background: var(--color-surface); box-shadow: var(--shadow-sm); overflow: hidden; position: relative; }
.card-img { position: relative; height: 130px; background: var(--color-surface-muted); overflow: hidden; }
.card-img img { width: 100%; height: 100%; object-fit: cover; }
.img-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; }
.gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.6) 0%, rgba(0,0,0,.2) 40%, transparent 100%); }
.price-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 10px 8px; z-index: 2; }
.price-text { font-size: 13px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.5); }
.badge { position: absolute; top: 8px; right: 8px; z-index: 3; background: var(--color-featured); color: var(--color-featured-text); font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 9999px; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.card-body { padding: 10px 12px 14px; }
.card-title { font-size: 13px; font-weight: 700; line-height: 1.4; color: var(--color-text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { display: flex; align-items: center; gap: 4px; margin-top: 6px; font-size: 11px; color: var(--color-text-muted); }
</style></head>
<body>
<div class="grid">
  <!-- Card 1: with image + featured -->
  <div class="card">
    <div class="card-img" style="background: linear-gradient(135deg,#c8e6c9,#a5d6a7)">
      <div class="gradient"></div>
      <div class="badge">مميز ★</div>
      <div class="price-overlay"><span class="price-text">١٢٠ د.أ</span></div>
    </div>
    <div class="card-body">
      <div class="card-title">شقة للإيجار في عمان — مفروشة بالكامل ٣ غرف</div>
      <div class="card-meta">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="var(--color-brand)"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        عمّان
      </div>
    </div>
  </div>
  <!-- Card 2: negotiable -->
  <div class="card">
    <div class="card-img" style="background: linear-gradient(135deg,#bbdefb,#90caf9)">
      <div class="gradient"></div>
      <div class="price-overlay"><span class="price-text">٨٥٠٠ د.أ (قابل للتفاوض)</span></div>
    </div>
    <div class="card-body">
      <div class="card-title">تويوتا كامري ٢٠٢٠ — فل كامل بدون حوادث</div>
      <div class="card-meta">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="var(--color-brand)"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        الزرقاء
      </div>
    </div>
  </div>
  <!-- Card 3: contact -->
  <div class="card">
    <div class="card-img">
      <div class="img-placeholder">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-muted)" stroke-width="1.5" style="opacity:.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      </div>
      <div class="gradient"></div>
      <div class="price-overlay"><span class="price-text">تواصل معنا</span></div>
    </div>
    <div class="card-body">
      <div class="card-title">آيفون ١٥ برو ماكس ٢٥٦ جيجا — جديد بضمان</div>
      <div class="card-meta">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="var(--color-brand)"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        إربد
      </div>
    </div>
  </div>
</div>
</body></html>
