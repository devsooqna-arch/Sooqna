<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="classic">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 0; background: var(--color-bg); font-family: var(--font-arabic); height: 160px; }
.phone-frame { max-width: 360px; margin: 0 auto; position: relative; height: 160px; }
.content-preview { padding: 12px 16px; color: var(--color-text-muted); font-size: 12px; }
nav.bottom { position: absolute; bottom: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid var(--color-nav-bottom-border); background: var(--color-nav-bottom); padding: 4px 0 8px; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px 10px; font-size: 10px; font-weight: 500; color: var(--color-text-muted); text-decoration: none; }
.nav-item.active { color: var(--color-brand); }
.nav-post { position: relative; top: -12px; width: 52px; height: 52px; border-radius: 9999px; background: var(--color-brand); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; font-size: 9px; font-weight: 700; box-shadow: 0 4px 12px rgba(45,106,45,.35); }
</style></head>
<body>
<div class="phone-frame">
  <div class="content-preview">محتوى الصفحة...</div>
  <nav class="bottom">
    <a class="nav-item active" href="#">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      بحث
    </a>
    <a class="nav-item" href="#">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      المفضلة
    </a>
    <a class="nav-post" href="#">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      أعلن
    </a>
    <a class="nav-item" href="#">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      رسائل
    </a>
    <a class="nav-item" href="#">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      حسابي
    </a>
  </nav>
</div>
</body></html>
