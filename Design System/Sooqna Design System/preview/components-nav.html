<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="classic">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 0; background: var(--color-bg); font-family: var(--font-arabic); color: var(--color-text); }
header { position: sticky; top: 0; z-index: 30; }
.top-bar { border-bottom: 1px solid var(--color-border); background: var(--color-surface); }
.top-inner { max-width: 700px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 8px 16px; }
.logo-text { font-size: 22px; font-weight: 800; color: var(--color-brand); letter-spacing: -1px; }
.nav-actions { display: flex; align-items: center; gap: 8px; }
.btn-login { border: 1px solid var(--color-border); border-radius: 9999px; background: transparent; padding: 5px 14px; font-size: 12px; font-family: var(--font-arabic); color: var(--color-text-muted); cursor: pointer; }
.btn-register { background: var(--color-brand); color: #fff; border: none; border-radius: 9999px; padding: 5px 14px; font-size: 12px; font-family: var(--font-arabic); font-weight: 600; cursor: pointer; }
.theme-btn { border: 1px solid var(--color-border); border-radius: 9999px; background: transparent; padding: 5px 12px; font-size: 11px; font-family: var(--font-arabic); color: var(--color-text-muted); cursor: pointer; }
.accent-bar { background: var(--color-accent-strip); border-bottom: 1px solid var(--color-accent-strip); }
.accent-inner { max-width: 700px; margin: 0 auto; display: flex; align-items: center; gap: 10px; padding: 6px 16px; }
.post-btn { background: var(--color-brand); color: #fff; border: none; border-radius: 9999px; padding: 7px 18px; font-size: 13px; font-family: var(--font-arabic); font-weight: 700; cursor: pointer; white-space: nowrap; }
.search-wrap { flex: 1; position: relative; }
.search-input { width: 100%; border: none; border-radius: 9999px; background: rgba(255,255,255,.85); color: var(--color-text); font-family: var(--font-arabic); font-size: 13px; padding: 7px 14px 7px 36px; outline: none; box-sizing: border-box; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); }
</style></head>
<body>
<header>
  <div class="top-bar">
    <div class="top-inner">
      <img src="../assets/logo.png" alt="سوقنا" style="height:36px;width:auto">
      <div class="nav-actions">
        <button class="theme-btn">🌙 Dark</button>
        <button class="btn-login">تسجيل الدخول</button>
        <button class="btn-register">إنشاء حساب</button>
      </div>
    </div>
  </div>
  <div class="accent-bar">
    <div class="accent-inner">
      <button class="post-btn">+ أعلن</button>
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" type="text" placeholder="ابحث عن إعلانات، سيارات، عقارات...">
      </div>
    </div>
  </div>
</header>
<div style="padding:12px 16px;font-size:11px;color:var(--color-text-muted)">
  ← Sticky header: top bar (logo + actions) + lime accent bar (post CTA + search)
</div>
</body></html>
