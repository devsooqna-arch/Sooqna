<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="classic">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 16px; background: var(--color-bg); font-family: var(--font-arabic); color: var(--color-text); }
.row { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
.slab { padding: 16px 24px; border-radius: 8px; display: flex; align-items: center; gap: 16px; border: 1px solid var(--color-border); }
.label { font-size: 10px; color: var(--color-text-muted); margin-top: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
</style></head>
<body>
<div class="row">
  <div>
    <div class="slab" style="background:var(--color-surface)">
      <img src="../assets/logo.png" alt="سوقنا" style="height:48px;width:auto">
    </div>
    <div class="label">On White</div>
  </div>
  <div>
    <div class="slab" style="background:var(--color-bg)">
      <img src="../assets/logo.png" alt="سوقنا" style="height:40px;width:auto">
    </div>
    <div class="label">On Background (header size)</div>
  </div>
  <div>
    <div class="slab" style="background:#1a1f16">
      <img src="../assets/logo.png" alt="سوقنا" style="height:40px;width:auto">
    </div>
    <div class="label">On Dark</div>
  </div>
  <div>
    <div>
      <img src="../assets/favicon.png" alt="" style="height:40px;width:auto;border-radius:8px">
    </div>
    <div class="label">Favicon / App Icon</div>
  </div>
</div>
<div style="font-size:11px;color:var(--color-text-muted);margin-top:4px">
  Logo renders at <b>82×40px</b> in the header (display size). Full-res PNG available at <code>assets/logo.png</code>.
  The logomark is a colorful market stall illustration with shopping cart, location pin, and Arabic wordmark.
</div>
</body></html>
