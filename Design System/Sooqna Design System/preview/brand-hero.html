<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="classic">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 0; background: var(--color-bg); font-family: var(--font-arabic); }
.hero { position: relative; height: 200px; overflow: hidden; border-radius: 8px; border: 1px solid var(--color-border); margin: 12px; }
.hero img { width: 100%; height: 100%; object-fit: cover; }
.overlay { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
.hero-content { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; text-align: center; color: #fff; padding: 16px; }
.hero-title { font-size: 20px; font-weight: 700; }
.hero-sub { font-size: 13px; opacity: .9; }
.hero-btns { display: flex; gap: 8px; }
.btn-hero-primary { background: var(--color-brand); color: #fff; border: none; border-radius: 9999px; padding: 7px 18px; font-size: 12px; font-weight: 700; font-family: var(--font-arabic); cursor: pointer; }
.btn-hero-ghost { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.7); border-radius: 9999px; padding: 7px 18px; font-size: 12px; font-weight: 600; font-family: var(--font-arabic); cursor: pointer; }
.dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
.dot { width: 10px; height: 10px; border-radius: 9999px; background: rgba(255,255,255,.4); border: 1px solid rgba(255,255,255,.7); }
.dot.active { background: #fff; }
</style></head>
<body>
<div class="hero">
  <img src="../assets/hero-slide-1.png" alt="hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <div class="hero-title">اكتشف أفضل الإعلانات بسهولة وأمان</div>
    <div class="hero-sub">ابحث حسب المدينة أو التصنيف ووصل لنتيجتك بسرعة</div>
    <div class="hero-btns">
      <button class="btn-hero-primary">تصفح الإعلانات</button>
      <button class="btn-hero-ghost">أضف إعلان</button>
    </div>
  </div>
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
  </div>
</div>
</body></html>
